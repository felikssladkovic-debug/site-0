<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Счетчик</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f9fafb;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
    }
    main {
      padding: 40px;
      border-radius: 24px;
      background: white;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.10);
      text-align: center;
      min-width: 260px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      line-height: 1.1;
    }
    .value {
      font-size: 72px;
      line-height: 1;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Счетчик</h1>
    <div class="value">1</div>
  </main>
</body>
</html>
